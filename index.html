<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞友航空知识考试平台</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background: linear-gradient(135deg,#1874CD,#4169E1);
            min-height: 100vh;
        }
        .top-bar{
            display:flex;
            justify-content:flex-end;
            align-items: center;
            padding:12px 25px;
            background:rgba(0,0,0,0.2);
            color:#ffffff;
        }
        .user-info{
            display: none;
            font-size:15px;
        }
        .logout-btn{
            padding:5px 18px;
            background: #ffffff;
            color: #1874CD;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size:14px;
        }
        .logout-btn:hover{
            background:#e8f0ff;
        }
        .hideTop .top-bar{
            display: none !important;
        }
        .container{
            max-width:900px;
            margin:30px auto;
            background:#fff;
            border-radius:15px;
            padding:30px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }
        h1{
            text-align:center;
            color:#1874CD;
            margin-bottom:25px;
            font-size:24px;
        }
        .login-wrap{
            text-align:center;
            padding:30px 0;
        }
        .login-wrap input{
            width:70%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            margin:10px 0;
            font-size:15px;
            outline: none;
        }
        .login-btn{
            padding:12px 35px;
            background:#1874CD;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }
        .level-box{
            display:flex;
            gap:15px;
            justify-content:center;
            margin-bottom:30px;
            flex-wrap:wrap;
        }
        .level-btn{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#1874CD;
            color:white;
            font-size:16px;
            cursor:pointer;
        }
        .level-btn:hover{
            background:#0F52BA;
        }
        .question-box{
            display:none;
        }
        .question-title{
            font-size:18px;
            margin:20px 0;
            line-height:1.6;
        }
        .option-item{
            margin:12px 0;
            font-size:16px;
            cursor:pointer;
            padding:10px 12px;
            border-radius:8px;
            border:1px solid #eee;
        }
        .option-item:hover{
            background:#f0f7ff;
        }
        .btn-group{
            display:flex;
            justify-content:center;
            gap:12px;
            flex-wrap: wrap;
            margin-top:30px;
        }
        .operate-btn{
            padding:10px 22px;
            border:none;
            border-radius:8px;
            background:#4169E1;
            color:#fff;
            cursor:pointer;
        }
        .score-text{
            text-align:center;
            font-size:17px;
            margin-top:20px;
            color:#ff5500;
            font-weight:bold;
        }
        .login-tip{
            text-align:center;
            font-size:18px;
            color:#666;
            padding:50px 0;
        }
    </style>
</head>
<body id="bodyMain">
    <div class="top-bar">
        <div class="user-info" id="userText"></div>
        <button class="logout-btn" id="outBtn" style="display:none" onclick="logout()">退出登录</button>
    </div>

    <div class="container">
        <h1>✈️ 飞友航空知识考试中心</h1>

        <div class="login-wrap" id="loginArea">
            <input type="text" id="userEmail" placeholder="请输入登录邮箱账号">
            <br>
            <button class="login-btn" onclick="loginSubmit()">立即登录</button>
        </div>

        <div class="level-box" id="levelBox" style="display:none;">
            <button class="level-btn" onclick="startExam(1)">入门基础题库</button>
            <button class="level-btn" onclick="startExam(2)">进阶航空题库</button>
            <button class="level-btn" onclick="startExam(3)">资深专业题库</button>
        </div>

        <div class="question-box" id="examBox">
            <div class="question-title" id="qTitle"></div>
            <div id="optionList"></div>
            <div class="btn-group">
                <button class="operate-btn" onclick="prevQuestion()">上一题</button>
                <button class="operate-btn" onclick="nextQuestion()">下一题</button>
                <button class="operate-btn" onclick="backSelect()">返回选题</button>
                <button class="operate-btn" onclick="submitExam()">提交试卷</button>
            </div>
            <div class="score-text" id="scoreShow"></div>
        </div>

        <div class="login-tip" id="noLoginTip" style="display:none">
            请先完成账号登录，才可进入考试答题
        </div>
    </div>

    <script>
        let userLogin = localStorage.getItem("flyUserLogin") || "";
        let userEmail = localStorage.getItem("flyUserEmail") || "";
        let nowLevel = 1;
        let nowIndex = 0;
        let userAnswer = [];
        let allQuestion = [];

        function updateLoginUI(){
            if(userLogin){
                document.getElementById("loginArea").style.display = "none";
                document.getElementById("levelBox").style.display = "flex";
                document.getElementById("outBtn").style.display = "block";
            }else{
                document.getElementById("loginArea").style.display = "block";
                document.getElementById("levelBox").style.display = "none";
                document.getElementById("outBtn").style.display = "none";
            }
        }

        window.onload = function(){
            updateLoginUI();
        }

        function loginSubmit(){
            let email = document.getElementById("userEmail").value.trim();
            if(!email){
                alert("请填写登录邮箱！");
                return;
            }
            localStorage.setItem("flyUserLogin","ok");
            localStorage.setItem("flyUserEmail",email);
            userLogin = "ok";
            userEmail = email;
            updateLoginUI();
        }

        function logout(){
            localStorage.removeItem("flyUserLogin");
            localStorage.removeItem("flyUserEmail");
            userLogin = "";
            userEmail = "";
            updateLoginUI();
        }

        const questionData = {
            1:[
                {q:"民航客机正常巡航高度大约是？",opt:["3000米","8000-12000米","20000米"],ans:1},
                {q:"波音747标志性外形特点是？",opt:["无翼下发动机","机头上方驼峰结构","单引擎设计"],ans:1},
                {q:"飞机起飞时主要依靠什么获得升力？",opt:["重力","机翼空气流速差","风力"],ans:1},
                {q:"民航航班常用无线电呼号开头一般为？",opt:["航班号","城市名","乘客姓名"],ans:0},
                {q:"航空中跑道字母L代表意思是？",opt:["左侧跑道","长途航线","轻型飞机道"],ans:0}
            ],
            2:[
                {q:"ANA全日空主力宽体机型不包含？",opt:["波音747","空客A380","螺旋桨小型客机"],ans:2},
                {q:"飞机遭遇强气流正确操作是？",opt:["快速拉升","系好安全带保持平稳飞行","急速下降"],ans:1},
                {q:"客机四个引擎布局常见于？",opt:["小型支线机","大型洲际远程客机","私人飞机"],ans:1},
                {q:"航空术语中进场指的是？",opt:["起飞滑行","降落靠近机场阶段","空中盘旋"],ans:1},
                {q:"民航禁止携带以下哪类物品登机？",opt:["随身水杯","易燃易爆物品","书本"],ans:1}
            ],
            3:[
                {q:"飞机近地警报系统主要作用是？",opt:["提醒高空风景","防止意外撞地预警","提示餐食服务"],ans:1},
                {q:"波音747最大载客量级属于？",opt:["窄体短途","大型宽体洲际客机","轻型训练机"],ans:1},
                {q:"空中交叉飞行避让通用规则是？",opt:["右侧优先避让","左侧优先","同向随意飞行"],ans:0},
                {q:"云层分层飞行主要目的是？",opt:["美观飞行","避开乱流稳定航行","加快飞行速度"],ans:1},
                {q:"民航机组标准执勤流程第一步是？",opt:["乘客登机","整机安全检查","启动引擎"],ans:1}
            ]
        };

        function startExam(level){
            if(!userLogin){
                document.getElementById("noLoginTip").style.display="block";
                return;
            }
            document.getElementById("bodyMain").classList.add("hideTop");
            nowLevel = level;
            nowIndex = 0;
            userAnswer = [];
            allQuestion = questionData[level];
            document.getElementById("levelBox").style.display="none";
            document.getElementById("examBox").style.display="block";
            document.getElementById("scoreShow").innerText="";
            renderQuestion();
        }

        function backSelect(){
            document.getElementById("bodyMain").classList.remove("hideTop");
            document.getElementById("examBox").style.display="none";
            document.getElementById("levelBox").style.display="flex";
        }

        function renderQuestion(){
            let item = allQuestion[nowIndex];
            document.getElementById("qTitle").innerText = `${nowIndex+1}.${item.q}`;
            let html = "";
            item.opt.forEach((val,idx)=>{
                let selectStyle = userAnswer[nowIndex]==idx?"color:#1874CD;font-weight:bold":"";
                html += `<div class="option-item" style="${selectStyle}" onclick="chooseAns(${idx})">${String.fromCharCode(65+idx)}.${val}</div>`;
            });
            document.getElementById("optionList").innerHTML = html;
        }

        function chooseAns(num){
            userAnswer[nowIndex] = num;
            renderQuestion();
        }

        function prevQuestion(){
            if(nowIndex>0){
                nowIndex--;
                renderQuestion();
            }
        }

        function nextQuestion(){
            if(nowIndex < allQuestion.length-1){
                nowIndex++;
                renderQuestion();
            }
        }

        function submitExam(){
            let rightNum = 0;
            allQuestion.forEach((item,idx)=>{
                if(userAnswer[idx]==item.ans) rightNum++;
            });
            let total = allQuestion.length;
            let score = Math.round((rightNum/total)*100);
            document.getElementById("scoreShow").innerText=`考试结束！答对${rightNum}题，总分${score}分`;
        }
    </script>
</body>
</html>
